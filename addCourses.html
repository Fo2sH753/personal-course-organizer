<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ِAdd courses</title>
    <meta name="Description" content="Keep track of your academic progress by adding your current subjects.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="icon/Gemini_Generated_Image_q34q37q34q37q34q.png">
</head>
<body>
    <header>
            <h1>Add courses</h1>
            <p>Fill the form to organize your semester.</p>
    </header>
    <nav>
        <a href="home.html" title="Back to home">← Back</a>
    </nav>
    <main>
        <section id="form">
            <form>
                <label for="course">Course title</label>
                <input type="text" name="course title : " placeholder="Enter course name here..." required id="course" checked minlength="2" maxlength="35">
                <br>
                <br>
                <label for="Instructor">Instructor</label>
                <input id="Instructor" type="text" name="Instructors" placeholder="Enter the name of instructor" required>
                <br>
                <br>
                <label for="credit-hour">credit hours</label>
                <input id="credit-hour" type="number" name="number of credit hours : " placeholder="number" min="1" max="5" required>
                <br>
                <br>
                <label>Notes</label>
                <textarea name="Notes" placeholder="write your Notes...." minlength="10" maxlength="250"></textarea> 
            </form>
        </section>
    </main>
    <footer>
        <section id="end">
            <p>&copy; 2026 Personal Course Organizer. All rights reserved.</p>
        <p>Created with ❤️ by [Mohamed Walid]</p>
        </section>
    </footer>
</body>
</html>
